# regras customizadas do semgrep
# foco em riscos comuns de segurança em aplicações node.js e express

rules:
  - id: nodejs-dangerous-code-execution
    pattern-either:
      - pattern: "eval(...)"
      - pattern: "new Function(...)"
    message: "uso de eval() ou new Function() detectado. esse tipo de execução dinâmica pode permitir injeção de código."
    languages:
      - javascript
      - typescript
    severity: ERROR
    metadata:
      owasp: "A03:2021 - Injection"
      cwe: "CWE-95"
      category: "code execution"

  - id: nodejs-weak-hash-md5-sha1
    pattern-either:
      - pattern: 'crypto.createHash("md5")'
      - pattern: 'crypto.createHash("sha1")'
      - pattern: "crypto.createHash('md5')"
      - pattern: "crypto.createHash('sha1')"
    message: "algoritmo de hash fraco detectado. para dados sensíveis, utilizar uma alternativa mais segura."
    languages:
      - javascript
      - typescript
    severity: ERROR
    metadata:
      owasp: "A02:2021 - Cryptographic Failures"
      cwe: "CWE-327"
      category: "cryptography"

  - id: nodejs-hardcoded-jwt-secret
    patterns:
      - pattern-either:
          - pattern: "jwt.sign($PAYLOAD, $SECRET, ...)"
          - pattern: "jwt.verify($TOKEN, $SECRET, ...)"
      - metavariable-regex:
          metavariable: $SECRET
          regex: '^[''"][^''"]{8,}[''"]$'
    message: "secret jwt escrito diretamente no código. utilizar variável de ambiente para armazenar esse valor."
    languages:
      - javascript
      - typescript
    severity: ERROR
    metadata:
      owasp: "A02:2021 - Cryptographic Failures"
      cwe: "CWE-798"
      category: "hardcoded secret"

  - id: nodejs-sql-string-concat
    pattern-either:
      - pattern: '$DB.query("..." + $INPUT)'
      - pattern: '$DB.execute("..." + $INPUT)'
      - pattern: |
          $DB.query(`...${$INPUT}...`)
      - pattern: |
          $DB.execute(`...${$INPUT}...`)
    message: "possível sql injection por concatenação de dados em query. utilizar parâmetros ou prepared statements."
    languages:
      - javascript
      - typescript
    severity: ERROR
    metadata:
      owasp: "A03:2021 - Injection"
      cwe: "CWE-89"
      category: "sql injection"

  - id: nodejs-sensitive-data-in-log
    pattern-either:
      - pattern: "console.log($X.password)"
      - pattern: "console.log($X.senha)"
      - pattern: "console.log($X.token)"
      - pattern: "console.log($X.jwt)"
      - pattern: "logger.info($X.password)"
      - pattern: "logger.info($X.senha)"
      - pattern: "logger.info($X.token)"
      - pattern: "logger.error($X.password)"
      - pattern: "logger.error($X.token)"
    message: "dado sensível sendo enviado para log. evitar registrar senha, token ou informações de autenticação."
    languages:
      - javascript
      - typescript
    severity: ERROR
    metadata:
      owasp: "A07:2021 - Identification and Authentication Failures"
      cwe: "CWE-532"
      category: "sensitive data exposure"

  - id: nodejs-cors-wildcard
    pattern-either:
      - pattern: 'cors({ origin: "*" })'
      - pattern: "cors({ origin: '*' })"
      - pattern: 'res.setHeader("Access-Control-Allow-Origin", "*")'
      - pattern: "res.setHeader('Access-Control-Allow-Origin', '*')"
    message: "cors liberado para qualquer origem. revisar se essa configuração é necessária."
    languages:
      - javascript
      - typescript
    severity: WARNING
    metadata:
      owasp: "A05:2021 - Security Misconfiguration"
      cwe: "CWE-942"
      category: "security misconfiguration"

  - id: nodejs-debug-enabled
    pattern-either:
      - pattern: 'app.set("env", "development")'
      - pattern: "app.set('env', 'development')"
      - pattern: |
          {
            debug: true
          }
    message: "configuração de debug ou desenvolvimento encontrada. verificar se isso não será usado em produção."
    languages:
      - javascript
      - typescript
    severity: WARNING
    metadata:
      owasp: "A05:2021 - Security Misconfiguration"
      category: "security misconfiguration"

  - id: express-api-route-without-auth
    patterns:
      - pattern-either:
          - pattern: "app.get($PATH, $HANDLER)"
          - pattern: "app.post($PATH, $HANDLER)"
          - pattern: "app.put($PATH, $HANDLER)"
          - pattern: "app.patch($PATH, $HANDLER)"
          - pattern: "app.delete($PATH, $HANDLER)"
      - pattern-not: "app.get($PATH, $AUTH, $HANDLER)"
      - pattern-not: "app.post($PATH, $AUTH, $HANDLER)"
      - pattern-not: "app.put($PATH, $AUTH, $HANDLER)"
      - pattern-not: "app.patch($PATH, $AUTH, $HANDLER)"
      - pattern-not: "app.delete($PATH, $AUTH, $HANDLER)"
      - metavariable-regex:
          metavariable: $PATH
          regex: '^[''"]/api/.*[''"]$'
    message: "rota de api sem middleware de autenticação visível. verificar se a rota realmente deve ser pública."
    languages:
      - javascript
      - typescript
    severity: WARNING
    metadata:
      owasp: "A01:2021 - Broken Access Control"
      cwe: "CWE-285"
      category: "access control"
