name: Pipeline Base - GitHub Actions

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: esteira-devsecops-open-source

jobs:
  checkout-node:
    name: Checkout e configuração do Node.js
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Executar lint
        run: npm run lint

  # Task 55 - Adicionando Job do Gitleaks para varredura de segredos [cite: 7]
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    [cite_start]needs: checkout-node # Task 57 - Dependência do Lint [cite: 9]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Criar pasta de relatório do Gitleaks
        [cite_start]run: mkdir -p reports/gitleaks [cite: 71]

      - name: Executar Gitleaks
        uses: docker://ghcr.io/gitleaks/gitleaks:latest
        with:
          args: >-
            detect
            --source=/github/workspace
            --config=/github/workspace/security/gitleaks/.gitleaks.toml
            --report-format=json
            --report-path=/github/workspace/reports/gitleaks/gitleaks-results.json
            --exit-code=0
            --redact

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: reports/gitleaks/gitleaks-results.json

  # Task 55 - Adicionando Job do Semgrep para análise SAST [cite: 7]
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    needs: checkout-node
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Criar pasta de relatório do Semgrep
        [cite_start]run: mkdir -p reports/semgrep [cite: 71]

      - name: Semgrep Scan
        # Task 70 - Executando regras OWASP, Node.js e Customizadas [cite: 70]
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/nodejs" \
            --config "security/semgrep/rules.yaml" \
            --severity=ERROR \
            --json \
            --output=reports/semgrep/semgrep-results.json

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        [cite_start]if: always() # Task 58 - Salvando artefato mesmo com erro [cite: 10]
        with:
          name: semgrep-report
          path: reports/semgrep/semgrep-results.json

  validate-reports:
    name: Validar Relatórios de Segurança
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Gitleaks Report
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks/

      - name: Download Semgrep Report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep/

      - name: Validar integridade dos relatórios
        run: |
          chmod +x scripts/validate-reports.sh
          bash scripts/validate-reports.sh

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    # Task 57 - O Build depende do sucesso das validações de segurança [cite: 9, 15]
    needs: [gitleaks, semgrep, validate-reports]
    if: success()

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Construir imagem Docker
        # PBI-11 - O Dockerfile deve conter USER node antes desta execução [cite: 19, 21]
        run: |
          docker build \
            --file Dockerfile \
            --tag $IMAGE_NAME:${{ github.sha }} \
            --tag $IMAGE_NAME:latest \
            .