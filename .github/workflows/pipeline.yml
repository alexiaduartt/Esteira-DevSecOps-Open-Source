name: Pipeline Base - GitHub Actions

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"] #Task 56 - Configurando execução automática em PRs
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: esteira-devsecops-open-source

jobs:
  checkout-node:
    name: Checkout e configuração do Node.js
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validar versão do Node.js e NPM
        run: |
          node --version
          npm --version

      - name: Listar arquivos do projeto
        run: ls -la

      - name: Instalar dependências
        run: npm install

      - name: Executar lint
        run: npm run lint

  #Task 55 - Adicionando Job do Gitleaks para varredura de segredos
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    needs: checkout-node #Task 57 - O Gitleaks só roda se o Lint passar (dependência)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 #Necessário para o Gitleaks analisar o histórico de commits

      - name: Definir nome padronizado do relatório
        run: |
          DATA=$(date +'%d%m%Y')
          echo "REPORT_NAME=gitleaks-${DATA}-run${{ github.run_number }}" >> $GITHUB_ENV

      # pasta criada para armazenar o relatório JSON gerado pelo Gitleaks
      - name: Criar pasta de relatório do Gitleaks
        run: mkdir -p reports/gitleaks

      - name: Executar Gitleaks com relatório JSON
        uses: docker://ghcr.io/gitleaks/gitleaks:latest
        with:
          args: >-
            detect
            --source=/github/workspace
            --config=/github/workspace/security/gitleaks/.gitleaks.toml
            --report-format=json
            --report-path=/github/workspace/reports/gitleaks/${{ env.REPORT_NAME }}.json
            --exit-code=1

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.REPORT_NAME }}
          path: reports/gitleaks/${{ env.REPORT_NAME }}.json
          if-no-files-found: ignore

  #Task 55 - Adicionando Job do Semgrep para análise SAST
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    needs: checkout-node #Justificativa: Task 57 - O Semgrep só roda se o Lint passar (dependência)
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Definir nome padronizado do relatório
        run: |
          DATA=$(date +'%d%m%Y')
          echo "REPORT_NAME=semgrep-${DATA}-run${{ github.run_number }}" >> $GITHUB_ENV

      # pasta criada para organizar o relatório gerado pelo semgrep dentro da estrutura reports do projeto
      - name: Criar pasta de relatório do Semgrep
        run: mkdir -p reports/semgrep

      - name: Semgrep Scan
        #Configurado para gerar saída em JSON para a Task 58 (Artifacts)
        # ajuste feito para executar regras do OWASP, regras de Node.js e as regras customizadas do projeto
        # o --error faz a pipeline falhar quando uma regra ERROR for encontrada
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/nodejs" \
            --config "security/semgrep/rules.yaml" \
            --severity=ERROR \
            --error \
            --json \
            --output=reports/semgrep/${{ env.REPORT_NAME }}.json

      #Task 58 - Salvando o relatório do Semgrep como artefato
      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        if: always() # Garante que o relatório seja salvo mesmo se encontrar erros
        with:
          name: ${{ env.REPORT_NAME }}
          path: reports/semgrep/${{ env.REPORT_NAME }}.json
          if-no-files-found: ignore

  validate-reports:
    name: Validar Relatórios de Segurança
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Gitleaks Report
        uses: actions/download-artifact@v4
        with:
          pattern: gitleaks-*
          path: reports/gitleaks/
          merge-multiple: true

      - name: Download Semgrep Report
        uses: actions/download-artifact@v4
        with:
          pattern: semgrep-*
          path: reports/semgrep/
          merge-multiple: true

      - name: Validar integridade dos relatórios
        run: |
          chmod +x scripts/validate-reports.sh
          bash scripts/validate-reports.sh

  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    #Task 57 - O Build agora depende do sucesso das ferramentas de segurança (SAST/Secrets)
    needs: [gitleaks, semgrep, validate-reports]
    if: ${{ needs.gitleaks.result == 'success' && needs.semgrep.result == 'success' && needs.validate-reports.result == 'success' }}

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Validar existência do Dockerfile
        run: |
          test -f Dockerfile
          echo "Dockerfile encontrado com sucesso."

      - name: Padronizar nome da imagem Docker
        run: |
          echo "Nome da imagem: $IMAGE_NAME"
          echo "Tag do commit: ${{ github.sha }}"

      - name: Construir imagem Docker
        run: |
          docker build \
            --file Dockerfile \
            --tag $IMAGE_NAME:${{ github.sha }} \
            --tag $IMAGE_NAME:latest \
            .

      - name: Validar imagem Docker gerada
        run: |
          docker images | grep $IMAGE_NAME
          echo "Imagem Docker gerada com sucesso."
